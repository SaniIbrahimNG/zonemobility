<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">

  <title>Deck Mobility</title>
  <meta name="description" content="Deck Mobility — a smart and efficient platform for rides, logistics, and transport ticketing in Nigeria.">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="header.png">

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website">
  <meta property="og:title" content="Deck Mobility">
  <meta property="og:description" content="Book rides, send packages, and reserve intercity tickets all in one place.">
  <meta property="og:image" content="header.png">

  <!-- Twitter -->
  <meta name="twitter:card" content="summary_large_image">
  <meta name="twitter:title" content="Deck Mobility">
  <meta name="twitter:description" content="Book rides, send packages, and reserve intercity tickets all in one place.">
  <meta name="twitter:image" content="header.png">

  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="Deck Mobility">

  <!-- Flutter & Google Maps -->
  <script src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAxmD8Gvtn1KGomBFy3pWXRFgvw0c4a-48"></script>
  <script src="flutter.js" defer></script>

  <script>
    const serviceWorkerVersion = null;
  </script>
</head>
<body>
  <script>
    window.addEventListener('load', function() {
      _flutter.loader.loadEntrypoint({
        serviceWorker: {
          serviceWorkerVersion: serviceWorkerVersion,
        },
        onEntrypointLoaded: function(engineInitializer) {
          engineInitializer.initializeEngine().then(function(appRunner) {
            appRunner.runApp();
          });
        }
      });
    });
  </script>
</body>
</html>
